<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moon Markdown Local Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Moon Markdown</h1>
        <p>Local Markdown to HTML preview powered by the MoonBit renderer.</p>
      </div>
      <div class="actions">
        <label class="file-button" for="file-input">Open Markdown</label>
        <input id="file-input" type="file" accept=".md,.markdown,text/markdown,text/plain" />
        <button id="download-html" type="button">Download HTML</button>
        <button id="copy-html" type="button">Copy HTML</button>
        <button id="open-stackedit" type="button">Markdown 预览</button>
        <button id="open-codepen" type="button">HTML 预览</button>
      </div>
    </header>

    <main class="workspace">
      <section class="pane editor-pane" aria-labelledby="editor-title">
        <div class="pane-header">
          <h2 id="editor-title">Markdown</h2>
          <span id="status" role="status">Ready</span>
        </div>
        <textarea id="markdown-input" spellcheck="false"></textarea>
      </section>

      <section class="pane preview-pane" aria-labelledby="preview-title">
        <div class="pane-header">
          <h2 id="preview-title">Preview</h2>
        </div>
        <article id="preview" class="preview"></article>
      </section>

      <section class="pane html-pane" aria-labelledby="html-title">
        <div class="pane-header">
          <h2 id="html-title">HTML</h2>
        </div>
        <pre><code id="html-output"></code></pre>
      </section>
    </main>

    <script src="../_build/js/debug/build/web/web.js" onerror="console.error('web.js failed to load')"></script>
    <script src="./app.js" onerror="console.error('app.js failed to load')"></script>
  </body>
</html>
